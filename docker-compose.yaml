version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - todonet

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app/
      dockerfile: Dockerfile
    restart: on-failure
    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "3000:3000"

    networks:
      - todonet

volumes:
  db_data: {}

networks:
  todonet:
    driver: bridge